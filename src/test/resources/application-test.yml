spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
        jdbc:
          time_zone: Asia/Seoul

  data:
    redis:
      host: localhost
      port: 6370

  jwt:
    secret: testjwt00sdGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2UtbWluaW11bS0yNTYtYml0c
    issuer: test-issuer

  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: dummy
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  threads:
    virtual:
      enabled: true

notification:
  dispatcher: sync

logging:
  level:
    com.han.back: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.orm.jdbc.extract: WARN
    org.springframework.data.redis: WARN