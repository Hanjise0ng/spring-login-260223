server:
  port: 8080

spring:
  application:
    name: back

  profiles:
    include: secret
    active: prod

  output:
    ansi:
      enabled: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Seoul

  threads:
    virtual:
      enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

        registration:
          kakao:
            client-id: DUMMY_REST_API_KEY_KAKAO
            client-secret: DUMMY_CLIENT_SECRET_KEY_KAKAO
            redirect-uri: ""
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
          naver:
            client-id: DUMMY_CLIENT_ID_NAVER
            client-secret: DUMMY_CLIENT_SECRET_NAVER
            redirect-uri: ""
            authorization-grant-type: authorization_code
            scope:

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE