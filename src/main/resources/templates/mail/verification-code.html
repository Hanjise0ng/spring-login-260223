<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>인증 코드</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f5f7; padding: 40px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="460" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); overflow: hidden;">
                <tr>
                    <td style="background-color: #1a1a2e; padding: 28px 40px; text-align: center;">
                        <h1 style="margin: 0; font-size: 18px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px;">{{TYPE_DESCRIPTION}}</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 40px 40px 20px;">
                        <p style="margin: 0 0 24px; font-size: 15px; color: #4a4a4a; line-height: 1.6;">아래 인증 코드를 입력하여 본인 확인을 완료해주세요.</p>
                        <div style="background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 24px; text-align: center; margin-bottom: 24px;">
                            <span style="font-size: 36px; font-weight: 700; color: #1a1a2e; letter-spacing: 8px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;">{{CODE}}</span>
                        </div>
                        <p style="margin: 0 0 8px; font-size: 13px; color: #868e96;">이 코드는 <strong style="color: #e03131;">{{EXPIRES_MINUTES}}분</strong> 동안 유효합니다.</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 40px;">
                        <hr style="border: none; border-top: 1px solid #e9ecef; margin: 12px 0;"/>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 16px 40px 32px;">
                        <p style="margin: 0; font-size: 12px; color: #adb5bd; line-height: 1.6;">본인이 요청하지 않았다면 이 메일을 무시해주세요.<br/>인증 코드는 절대 타인에게 공유하지 마세요.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color: #f8f9fa; padding: 20px 40px; text-align: center;">
                        <p style="margin: 0; font-size: 11px; color: #adb5bd;">&copy; 2026 HAN. All rights reserved.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
