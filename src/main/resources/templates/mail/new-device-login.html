<meta charset="UTF-8">
<h2 class="title-text">
    새로운 기기에서 로그인되었습니다
</h2>

<p class="desc-text">
    안녕하세요, {{NICKNAME}}님.<br>
    아래 기기에서 새로운 로그인이 감지되었습니다.
</p>

<div class="info-box">
    <p class="info-box-text">
        기기 유형: {{DEVICE_TYPE}}<br>
        운영체제: {{OS_NAME}}<br>
        접속 IP: {{LOGIN_IP}}<br>
        로그인 시각: {{LOGIN_AT}}
    </p>
</div>

<p class="sub-text">
    본인이 직접 로그인한 경우 이 메일을 무시하셔도 됩니다.<br>
    본인이 아닌 경우 즉시 비밀번호를 변경하고 보안 설정을 확인해 주세요.
</p>

<div class="btn-wrapper">
    <a href="{{SECURITY_URL}}" class="primary-btn">
        보안 설정 확인
    </a>
</div>

<div class="info-box">
    <p class="info-box-text">
        ※ 본인이 로그인한 경우 추가 조치는 필요하지 않습니다.
    </p>
</div>
