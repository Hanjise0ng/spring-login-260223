<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        /* [1] 전체 구조 및 리셋 스타일 */
        body { margin:0; padding:0; background-color:#f5f5f5; font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif; }
        .mail-wrapper { background-color:#f5f5f5; padding:40px 20px; width:100%; }
        .mail-container { max-width:600px; width:100%; background-color:#ffffff; margin:0 auto; }

        /* [2] 헤더 & 푸터 */
        .header { padding:30px 40px; border-bottom:2px solid #a1bbf4; text-align:center; }
        .header-logo { font-size:24px; font-weight:800; color:#6984bd; letter-spacing:1px; }
        .content { padding:40px; }
        .footer { padding:24px 40px; background-color:#f9f9f9; border-top:1px solid #e5e5e5; }
        .footer-text { color:#999; font-size:12px; line-height:1.6; margin:0; text-align:center; }

        /* [3] 공통 텍스트 스타일 */
        .title-text { color:#222; font-size:22px; font-weight:700; margin:0 0 20px; }
        .desc-text { color:#444; font-size:15px; line-height:1.6; margin:0 0 20px; }
        .sub-text { color:#888; font-size:13px; margin:0 0 30px; }

        /* [4] 인증번호 전용 스타일 */
        .code-box { background-color:#f0f4ff; border-radius:8px; padding:30px; text-align:center; margin:30px 0; }
        .code-text { color:#2563eb; font-size:32px; font-weight:700; letter-spacing:4px; margin:0; }

        /* [5] 버튼 및 안내 박스 스타일 */
        .btn-wrapper { margin:30px 0; text-align:center; }
        .primary-btn { display:inline-block; padding:14px 36px; background-color:#2563eb; color:#ffffff; text-decoration:none; font-weight:600; font-size:15px; border-radius:6px; }
        .info-box { background-color:#f8f9fa; border:1px solid #eee; padding:20px; border-radius:6px; margin-top:40px; }
        .info-box-text { color:#666; font-size:13px; line-height:1.6; margin:0; }
    </style>
</head>
<body>
<table class="mail-wrapper" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td align="center">
            <table class="mail-container" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td class="header">
                        <span class="header-logo">HAN</span>
                    </td>
                </tr>

                <tr>
                    <td class="content">
                        {{BODY}}
                    </td>
                </tr>

                <tr>
                    <td class="footer">
                        <p class="footer-text">
                            본 메일은 발신 전용입니다. 궁금하신 사항은 고객센터로 문의해주세요.<br>
                            © HAN Service. All rights reserved.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
