# ─────────────────────────────────────────
# 시작 명령어: docker compose up -d
# 종료 명령어: docker compose down
# ─────────────────────────────────────────

services:
  redis:
    image: redis:latest
    container_name: han_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: always

volumes:
  redis_data: